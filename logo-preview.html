<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&display=swap" rel="stylesheet">
  <style>
    body { font-family: Inter, sans-serif; background: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 40px; margin: 0; }
    .preview-box { background: white; border-radius: 20px; padding: 48px 64px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); display: flex; flex-direction: column; align-items: center; gap: 32px; }
    .label { font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; }
    .dark-bg { background: #0f172a; border-radius: 20px; padding: 48px 64px; display: flex; flex-direction: column; align-items: center; gap: 32px; }
  </style>
</head>
<body>

  <div class="preview-box">
    <div class="label">Light background</div>
    <img src="logo.svg" width="220" height="64">
    <img src="logo.svg" width="160" height="46">
    <img src="logo.svg" width="110" height="32">
  </div>

  <div class="dark-bg">
    <div class="label" style="color:#475569">Dark background</div>
    <img src="logo.svg" width="220" height="64">
  </div>

</body>
</html>
